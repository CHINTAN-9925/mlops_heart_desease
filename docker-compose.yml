services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    volumes:
      - mongo_data:/data/db
    # port not exposed — only reachable internally

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - PORT=5001
    depends_on:
      - mongo
    # scale to multiple replicas:  docker compose up --scale backend=2
    # ip_hash in nginx pins each client IP to one replica

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:5001
    restart: unless-stopped
    environment:
      - BACKEND_URL=http://backend:5001
    volumes:
      - nextjs_static:/shared   # entrypoint copies .next/static here at startup
    depends_on:
      - backend

  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    ports:
      - "80:80"                 # single public entry point
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - nextjs_static:/shared:ro
    depends_on:
      - frontend
      - backend

  jenkins:
    build:
      context: ./jenkins
    restart: unless-stopped
    ports:
      - "8080:8080"   # Jenkins web UI
      - "50000:50000" # Jenkins agent (JNLP) port
    volumes:
      - jenkins_home:/var/jenkins_home
      # Mount host Docker socket so Jenkins can build/run containers
      - /var/run/docker.sock:/var/run/docker.sock
      # Mount the project root read-only as a fallback workspace reference
      - .:/workspace:ro

volumes:
  mongo_data:
  nextjs_static:
  jenkins_home:
