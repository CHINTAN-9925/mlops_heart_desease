services:

  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  backend:
    build:
      context: ./backend
    restart: unless-stopped
    ports:
      - "5001:5001"
    environment:
      - MONGO_URI=mongodb://mongo:27017
      - PORT=5001
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
      args:
        BACKEND_URL: http://backend:5001
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - BACKEND_URL=http://backend:5001
    depends_on:
      - backend

volumes:
  mongo_data:
