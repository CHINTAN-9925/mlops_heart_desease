server {
    listen 80;

    # Docker's internal DNS — resolves hostnames at request time, not startup
    resolver 127.0.0.11 valid=10s;

    # ── Next.js static assets — proxied to Next.js ───────────────────────────
    location /_next/ {
        set $frontend frontend:3000;
        proxy_pass         http://$frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API — strip /api prefix, proxy to Flask ───────────────────────
    # Browser:  GET /api/predict  →  nginx  →  backend:5001/predict
    location /api/ {
        set $backend backend:5001;
        proxy_pass         http://$backend/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Everything else — Next.js SSR ─────────────────────────────────────────
    location / {
        set $frontend frontend:3000;
        proxy_pass         http://$frontend;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
