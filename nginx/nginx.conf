# ── Upstream: backend pool with sticky sessions ───────────────────────────────
upstream backend_pool {
    ip_hash;            # pin each client IP to one backend replica
    server backend:5001;
}

server {
    listen 80;

    # ── Next.js static assets — proxied to Next.js ───────────────────────────
    location /_next/ {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ── Backend API — strip /api prefix, proxy to Flask ───────────────────────
    # Browser:  GET /api/predict  →  nginx  →  backend:5001/predict
    location /api/ {
        proxy_pass         http://backend_pool/;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
    }

    # ── Everything else — Next.js SSR ─────────────────────────────────────────
    location / {
        proxy_pass         http://frontend:3000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        "upgrade";
    }
}
